# FeCIM Lattice Tools - MNIST Demo Parameters
# References: [16][17][18] (see config/materials.yaml)

# =============================================================================
# MNIST DEMO PARAMETERS
# =============================================================================
# References: [16][17][18]
mnist:
  # Network architecture
  input_size: 784               # 28x28 pixels
  hidden_sizes: [128, 64]       # Hidden layer sizes
  output_size: 10               # 10 digit classes

  # Training
  epochs: 10  # Full training passes over dataset.
  batch_size: 64  # Samples per optimization batch.
  learning_rate: 0.001  # Optimizer learning rate (dimensionless).

  # Reference accuracy (peer-reviewed benchmarks, not targets)
  # Note: Accuracy varies with noise, levels, and architecture
  baseline_accuracy: 0.966      # Literature benchmark from Nature Communications 2023, DOI 10.1038/s41467-023-42110-y; not yet promoted to VERIFIED in docs/4-research/honesty-audit.md
  best_accuracy: 0.9824         # Verified FTJ reservoir benchmark from Journal of Alloys and Compounds 2025, DOI 10.1016/j.jallcom.2025.181869 (not this simulator)
  # tour_claimed_accuracy: 0.87 # REMOVED - unverified conference claim below peer-reviewed
  current_limited_accuracy: 0.97 # Reported current-limited FeFET benchmark; keep tagged as unverified until its DOI is wired into docs/4-research/honesty-audit.md
  fashion_mnist_rc: 0.8838      # 88.38% Fashion MNIST with reservoir computing
