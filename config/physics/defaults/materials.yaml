      gamma_landau: 1.950e10    # Stability (Positive) [J m^9 / C^6]
      rho_viscosity: 0.05       # Damping/Viscosity (Ohm·m), tuned for ~1ns switching
      curie_const_k: 1.5e5      # Curie constant (K)

