# FeCIM Lattice Tools - Physics Configuration
# =============================================
#
# This file contains all physical parameters for ferroelectric CIM simulation.
# Edit this file to experiment with different materials and hardware configurations.
#
# =============================================================================
# REFERENCES (Updated 2026-01-26)
# =============================================================================
#
# Core Material (HfO2-ZrO2 Superlattice):
#   [1] Park et al., Adv. Mater. 27, 1811 (2015) - HZO ferroelectricity discovery
#   [2] Cheema et al., Nature 580, 478 (2020) - Superlattice enhancement
#   [3] Nature Commun. 2025, doi:10.1038/s41467-025-61758-2 - Epitaxial superlattice stability
#   [4] ACS Nano 2024, doi:10.1021/acsnano.4c01992 - 4nm HZO, 10^10 endurance at 1.2V
#   [5] ACS Appl. Nano Mater. 2024, doi:10.1021/acsanm.4c04974 - 50µC/cm² Pr, 10^10 endurance
#   [6] ACS Omega 2025, doi:10.1021/acsomega.4c10603 - Multilayer reduced wake-up
#   [7] APL Materials 2023, doi:10.1063/5.0148068 - HZO roadmap
#
# Switching Dynamics:
#   [8] Purdue Thesis 2024 - Sub-ns switching (925ps), 360ps record in sub-µm arrays
#   [9] Nature Commun. 2025, doi:10.1038/s41467-025-66807-4 - Domain switching holography
#
# Cryogenic Operation:
#   [10] Adv. Electron. Mater. 2024, doi:10.1002/aelm.202300879 - 75µC/cm² Pr at 4K
#   [11] Adv. Electron. Mater. 2025, doi:10.1002/aelm.202400840 - Compact model to 4K
#
# CIM & Energy:
#   [12] Samsung Nature 2025 - 25-100x energy vs NAND
#   [13] Nature Electron. 2025, doi:10.1038/s41928-025-01477-0 - Analog matrix solving
#   [14] DAC 2024, doi:10.1145/3649329.3658472 - 160 GOPS/mm², 25.5 TOPS/W
#
# FeFET Crossbar:
#   [15] Nature Commun. 2023, doi:10.1038/s41467-023-42110-y - MLC FeFET crossbar demo
#   [16] IEEE 2023 - 28nm current-limited FeFET, 97% MNIST accuracy
#
# Tour Lab:
#   [17] Dr. external research group, COSM 2025 - 30 discrete states, 87% MNIST (unverified)
#   [18] Adv. Electron. Mater. 2024, doi:10.1002/aelm.202400603 - In2Se3 FWF synthesis
#
# Endurance & Reliability:
#   [19] IEEE IRPS 2022 - 10^9 cycle endurance verified
#   [20] ResearchGate 2024 - 10^10 endurance with AFE ZrO2 seed layer
#
# Multi-Level Demonstrations:
#   [21] Oh et al., IEEE EDL 38(6), 732 (2017) - 32 analog states HZO FeFET
#   [22] Song et al., Adv. Science 2024, doi:10.1002/advs.202308588 - 2D FeFET >7-bit (140 states)
#   [23] ACS Appl. Mater. Interfaces 2022, doi:10.1021/acsami.2c04441 - High-speed FTJ multilevel
#
# Alternative Ferroelectrics:
#   [24] Nature Commun. 2025, doi:10.1038/s41467-025-62904-6 - AlScN decoupled Pr/Ec, 15V window
#   [25] APL Materials 2023, doi:10.1063/5.0148068 - AlScN 100-170 µC/cm² Pr, 2-6 MV/cm Ec
#   [26] Nature Commun. 2017, doi:10.1038/ncomms14956 - In2Se3 intrinsic 2D ferroelectricity
#   [27] InfoMat 2022, doi:10.1002/inf2.12341 - In2Se3 for ferroelectric data storage
#   [28] AIP Appl. Phys. Rev. 2024, doi:10.1063/5.0190692 - In2Se3 phase transitions & devices

# =============================================================================
# GLOBAL CONSTANTS
# =============================================================================
constants:
  fecim_levels: 30              # Discrete analog states ("30 discrete states" - Dr. Tour)
  bits_per_cell: 4.91           # log2(30) = 4.91 bits/cell
  boltzmann_ev: 8.617e-5        # Boltzmann constant (eV/K)
  epsilon_0: 8.854e-12          # Vacuum permittivity (F/m)
  room_temperature: 300         # Standard room temperature (K)

# =============================================================================
# MATERIALS
# =============================================================================
# Three-tier system:
#   default_hzo: Baseline standard HZO from literature
#   fecim_hzo: Dr. Tour's FeCIM demonstrated values (conservative)
#   literature_superlattice: Best academic results (Cheema 2020)

materials:
  default_hzo:
    name: "HZO (Si-doped)"
    description: "Standard Si-doped HfO2-ZrO2 from literature"
    reference: "Park et al., Adv. Mater. 27, 1811 (2015) [1]"
    analog_states: 30           # Standard HZO achieves ~30 discrete states

    # Polarization parameters [1][4]
    pr_c_m2: 0.25               # Remanent polarization (C/m²) = 25 µC/cm²
    ps_c_m2: 0.30               # Saturation polarization (C/m²) = 30 µC/cm²

    # Field parameters [1][7]
    ec_v_m: 1.2e8               # Coercive field (V/m) = 1.2 MV/cm

    # Dielectric properties [7]
    epsilon_hf: 30              # High-frequency permittivity
    epsilon_lf: 38              # Low-frequency permittivity
    loss_tangent: 0.02          # Dielectric loss (tan δ)

    # Film geometry
    thickness_m: 10.0e-9        # Film thickness = 10 nm
    area_m2: 100.0e-12          # Cell area = 100 nm² (10nm x 10nm)

    # Switching dynamics [8]
    tau_s: 1.0e-9               # Switching time constant = 1 ns
    tau0_s: 1.0e-13             # Attempt frequency inverse
    activation_energy_ev: 0.7   # Activation energy for switching
    kai_exponent: 2.0           # KAI model exponent (2D domain growth)

    # Temperature properties [7][10]
    curie_temp_k: 723           # Curie temperature ~450°C
    temp_coeff_ec: -2.0e5       # dEc/dT (V/m/K)
    temp_coeff_pr: -5.0e-5      # dPr/dT (C/m²/K)

    # Reliability [4][19][20]
    endurance_cycles: 1.0e10    # Endurance limit (verified)
    retention_time_s: 3.15e9    # 100 years at 85°C
    imprint_field_v_m: 1.0e6    # Imprint field shift

  fecim_hzo:
    name: "FeCIM HZO"
    description: "Dr. Tour's FeCIM - DEMONSTRATED values only"
    reference: "Dr. external research group, COSM 2025 [17]"
    analog_states: 30           # 30 discrete states - VERIFIED (Dr. Tour)
    
    # Depolarization for Polycrystalline Analog Behavior
    # Creates "slant" in hysteresis loop to enable 30-level operation
    depolarization_factor_vm_c: 2.5e8  # V*m/C - Tuning knob for analog slope
    
    # Polarization (estimated - not disclosed) [17][18]
    pr_c_m2: 0.30               # 30 µC/cm² (estimated from In2Se3 work)
    ps_c_m2: 0.35               # 35 µC/cm² (estimated)
    
    # Field parameters (estimated) [17]
    ec_v_m: 1.0e8               # 1.0 MV/cm (estimated)

    # Dielectric properties (estimated)
    epsilon_hf: 32
    epsilon_lf: 40
    loss_tangent: 0.01          # Low loss

    # Film geometry [17]
    thickness_m: 10.0e-9        # 10 nm
    area_m2: 2.025e-15          # 45nm pitch = 45nm x 45nm
    cell_pitch_nm: 45           # Cell pitch

    # Switching dynamics [17]
    tau_s: 10.0e-9              # 10 ns (from Tour's slides, not 1ns)
    tau0_s: 1.0e-13
    activation_energy_ev: 0.6
    kai_exponent: 2.0

    # Temperature properties [7]
    curie_temp_k: 723
    temp_coeff_ec: -1.8e5
    temp_coeff_pr: -4.0e-5

    # Reliability - DEMONSTRATED values only [17][19]
    endurance_cycles: 1.0e9     # 10^9 DEMONSTRATED (10^12 is TARGET)
    retention_time_s: 1.0e7     # ~116 days DEMONSTRATED
    imprint_field_v_m: 1.0e6

  fecim_hzo_target:
    name: "FeCIM HZO (TARGET)"
    description: "Dr. Tour's FeCIM - ASPIRATIONAL targets (NOT demonstrated)"
    reference: "Dr. external research group, COSM 2025"
    analog_states: 30           # Same as FeCIM demonstrated

    # Same as fecim_hzo except reliability targets
    pr_c_m2: 0.30
    ps_c_m2: 0.35
    ec_v_m: 1.0e8
    epsilon_hf: 32
    epsilon_lf: 40
    loss_tangent: 0.01
    thickness_m: 10.0e-9
    area_m2: 2.025e-15
    cell_pitch_nm: 45
    tau_s: 1.0e-9               # TARGET: 1ns (demonstrated ~10ns)
    tau0_s: 1.0e-13
    activation_energy_ev: 0.6
    kai_exponent: 2.0
    curie_temp_k: 723
    temp_coeff_ec: -1.8e5
    temp_coeff_pr: -4.0e-5
    endurance_cycles: 1.0e12    # TARGET - not yet achieved
    retention_time_s: 3.15e9    # TARGET - 100 years (not demonstrated)
    imprint_field_v_m: 1.0e6

  literature_superlattice:
    name: "Literature Superlattice"
    description: "Best academic HfO2/ZrO2 superlattice results"
    reference: "Cheema et al., Nature 580, 478 (2020) [2]; Nature Commun. 2025 [3]"
    analog_states: 64           # Enhanced superlattice supports more states

    # Enhanced polarization [2][3][5]
    pr_c_m2: 0.50               # 50 µC/cm² (superlattice enhanced) [5]
    ps_c_m2: 0.55               # 55 µC/cm²

    # Reduced coercive field [3]
    ec_v_m: 0.85e8              # 0.85 MV/cm (Nature Commun. 2025)

    # Dielectric properties [2][7]
    epsilon_hf: 35
    epsilon_lf: 50
    loss_tangent: 0.015

    # Film geometry [3]
    thickness_m: 10.0e-9
    area_m2: 100.0e-12

    # Faster switching [8]
    tau_s: 0.36e-9              # 360 ps RECORD (Purdue sub-µm arrays)
    tau0_s: 1.0e-13
    activation_energy_ev: 0.5   # Lower barrier
    kai_exponent: 2.5

    # Higher thermal stability [3][7]
    curie_temp_k: 773           # ~500°C
    temp_coeff_ec: -1.5e5
    temp_coeff_pr: -3.0e-5

    # Literature best-case reliability [3][4][20]
    endurance_cycles: 1.0e10    # 10^10 verified [3][4], 10^12 claimed but rare
    retention_time_s: 3.15e8    # 10-year at 85°C verified
    imprint_field_v_m: 0.5e6

  # NEW: Cryogenic operation profile (for quantum computing integration)
  cryogenic_hzo:
    name: "Cryogenic HZO"
    description: "HZO performance at 4K for quantum computing"
    reference: "Adv. Electron. Mater. 2024 [10]; 2025 [11]"
    analog_states: 48           # Enhanced polarization at cryo enables more states

    # ENHANCED polarization at cryogenic temps [10]
    pr_c_m2: 0.75               # 75 µC/cm² at 4K (RECORD - improved from RT!)
    ps_c_m2: 0.80               # 80 µC/cm²

    # Field parameters at 4K [10][11]
    ec_v_m: 1.5e8               # Higher Ec at cryo (~1.5 MV/cm)
    memory_window_v: 7.0        # 6-8V memory window at cryo

    # Dielectric properties [10]
    epsilon_hf: 28              # Slightly reduced at cryo
    epsilon_lf: 35
    loss_tangent: 0.008         # Lower loss at cryo

    # Film geometry
    thickness_m: 10.0e-9
    area_m2: 100.0e-12

    # Switching at cryo [10]
    tau_s: 1.0e-9               # ~1 ns maintained
    tau0_s: 1.0e-13
    activation_energy_ev: 0.7
    kai_exponent: 2.0

    # Temperature [10][11]
    operating_temp_k: 4         # 4 Kelvin
    linearity_improvement: true # Better linearity below 100K

    # Reliability at cryo [10]
    endurance_cycles: 1.0e9     # 10^9 at ±5V verified at cryo
    retention_time_s: 3.15e10   # >10 years at cryo (improved)
    imprint_field_v_m: 0.3e6    # Reduced imprint at cryo

  # ---------------------------------------------------------------------------
  # MULTI-LEVEL DEMONSTRATIONS (Peer-Reviewed)
  # ---------------------------------------------------------------------------

  hzo_standard_32:
    name: "HZO Standard (32 states)"
    description: "Standard HZO FeFET demonstrating 32 analog states"
    reference: "Oh et al., IEEE EDL 38(6), 732 (2017) [21]"
    analog_states: 32           # PEER-REVIEWED: 32 discrete states

    # Polarization parameters [21]
    pr_c_m2: 0.20               # 20 µC/cm²
    ps_c_m2: 0.25               # 25 µC/cm²

    # Field parameters [21]
    ec_v_m: 1.0e8               # 1.0 MV/cm

    # Dielectric properties
    epsilon_hf: 28
    epsilon_lf: 35
    loss_tangent: 0.02

    # Film geometry
    thickness_m: 10.0e-9        # 10 nm
    area_m2: 100.0e-12

    # Switching dynamics
    tau_s: 10.0e-9              # 10 ns
    tau0_s: 1.0e-13
    activation_energy_ev: 0.7
    kai_exponent: 2.0

    # Temperature
    curie_temp_k: 723

    # Reliability [21]
    endurance_cycles: 1.0e8     # 10^8 cycles (2017 era)
    retention_time_s: 3.15e8    # 10 years projected

  hzo_ftj_140:
    name: "HZO FTJ (140 states)"
    description: "HZO Ferroelectric Tunnel Junction with >7-bit operation"
    reference: "Song et al., Adv. Science 2024 [22]; ACS AMI 2022 [23]"
    analog_states: 140          # PEER-REVIEWED: >7-bit = 128-140 states

    # Polarization parameters [22][23]
    pr_c_m2: 0.25               # 25 µC/cm²
    ps_c_m2: 0.30               # 30 µC/cm²

    # Field parameters - FTJ requires thinner films
    ec_v_m: 1.2e8               # 1.2 MV/cm

    # Dielectric properties
    epsilon_hf: 30
    epsilon_lf: 40
    loss_tangent: 0.015

    # Film geometry - ULTRATHIN for tunneling [22][23]
    thickness_m: 4.5e-9         # 4.5 nm (tunnel barrier)
    area_m2: 100.0e-12

    # Switching dynamics - FTJ is fast [23]
    tau_s: 20.0e-9              # 20 ns switching
    tau0_s: 1.0e-13
    activation_energy_ev: 0.5   # Lower barrier for tunneling
    kai_exponent: 2.0

    # FTJ-specific parameters [22][23]
    ter_ratio: 834              # Tunneling electroresistance ratio
    gmax_gmin_ratio: 1.0e5      # >10^5 conductance ratio

    # Temperature
    curie_temp_k: 723

    # Reliability [22]
    endurance_cycles: 1.0e7     # 10^7 cycles demonstrated
    retention_time_s: 3.15e8    # 10 years extrapolated

  # ---------------------------------------------------------------------------
  # ALTERNATIVE FERROELECTRICS (Lower TRL for 30-state applications)
  # ---------------------------------------------------------------------------

  alscn:
    name: "AlScN (8-16 states)"
    description: "Aluminum Scandium Nitride - high Pr but high Ec limits granularity"
    reference: "Nature Commun. 2025 [24]; APL Materials 2023 [25]"
    analog_states: 16           # PEER-REVIEWED: 8-16 states (penta-level demonstrated)
    trl_level: 4                # Lower technology readiness

    # Polarization - VERY HIGH [24][25]
    pr_c_m2: 1.20               # 120 µC/cm² (range: 100-172 µC/cm²)
    ps_c_m2: 1.50               # 150 µC/cm²

    # Field parameters - VERY HIGH Ec limits state granularity [24][25]
    ec_v_m: 5.0e8               # 5.0 MV/cm (range: 2-6 MV/cm)
    memory_window_v: 15.0       # 15V memory window [24]

    # Dielectric properties [25]
    epsilon_hf: 10              # Lower permittivity than HZO
    epsilon_lf: 12
    loss_tangent: 0.01

    # Film geometry
    thickness_m: 20.0e-9        # 20 nm typical
    area_m2: 100.0e-12

    # Switching dynamics
    tau_s: 10.0e-9              # ~10 ns
    tau0_s: 1.0e-13
    activation_energy_ev: 1.0   # Higher barrier
    kai_exponent: 2.0

    # Temperature - VERY HIGH Curie temp [25]
    curie_temp_k: 1273          # >1000°C - excellent thermal stability

    # Composition (typical)
    sc_fraction: 0.36           # Al0.64Sc0.36N optimal

    # Reliability [24]
    endurance_cycles: 1.0e9     # 10^9 cycles
    retention_time_s: 3.15e8

    # Limitations
    # - High Ec (5 MV/cm) requires high voltages, limits analog granularity
    # - Best for binary/few-level rather than 30-state applications

# =============================================================================
# CROSSBAR ARRAY CONFIGURATION
# =============================================================================
# References: [13][14][15][16]
crossbar:
  # Default array dimensions [15]
  default_rows: 128
  default_cols: 128
  max_demonstrated_rows: 145    # 145×145 demonstrated [ferroelectric memristor 2025]

  # Quantization [15][17]
  quantization_levels: 30       # Same as fecim_levels
  mlc_levels: 7                 # 7 VT states (~3-bit) demonstrated [15]
  adc_bits: 8                   # ADC resolution
  dac_bits: 8                   # DAC resolution

  # Conductance range (Siemens) [15]
  conductance_min_s: 1.0e-6     # 1 µS (Gmin)
  conductance_max_s: 100.0e-6   # 100 µS (Gmax)
  conductance_ratio: 100        # Gmax/Gmin = on/off ratio
  ter_ratio: 911                # TER ~911% in MIFS structure

  # Non-idealities [16]
  device_variation: 0.05        # Device-to-device σ (5%)
  read_noise: 0.02              # Read noise σ (2%)
  write_noise: 0.03             # Write noise σ (3%)
  # Note: Current-limited design achieves 97% MNIST vs 9.8% without [16]

  # Line resistance (for IR drop simulation)
  word_line_resistance_ohm: 10  # Word line R per segment
  bit_line_resistance_ohm: 10   # Bit line R per segment

  # Sneak path parameters
  # Note: FCM (capacitive) arrays avoid IR drop and DC sneak paths
  sneak_path_enabled: true
  sneak_conductance_ratio: 0.01 # Leakage/on ratio
  fcm_sneak_free: true          # Capacitive arrays are sneak-free

# =============================================================================
# TRAINING CONFIGURATION
# =============================================================================
training:
  # Learning parameters
  learning_rate: 0.01
  weight_decay: 1.0e-4          # L2 regularization
  momentum: 0.9

  # Batch settings
  default_batch_size: 32
  gradient_clip: 1.0

  # Hardware-aware constraints
  weight_clip_min: 0.0          # Minimum weight (maps to Gmin)
  weight_clip_max: 1.0          # Maximum weight (maps to Gmax)
  update_noise_sigma: 0.01      # Noise in weight updates
  asymmetry_ratio: 1.0          # Potentiation/depression asymmetry (1.0 = symmetric)

  # Quantization-aware training
  quantize_forward: true        # Quantize in forward pass
  quantize_backward: false      # Full precision gradients
  straight_through: true        # STE for quantization gradients

# =============================================================================
# ENERGY PARAMETERS
# =============================================================================
# References: [12][13][14]
energy:
  # Per-operation energy (Joules) [14]
  read_energy_j: 1.0e-15        # ~1 fJ per read
  write_energy_j: 10.0e-15      # ~10 fJ per write
  mac_energy_j: 5.0e-15         # ~5 fJ per MAC operation
  puf_readout_energy_j: 1.89e-15 # 1.89 fJ/bit PUF readout (Nature Commun. 2025)

  # Comparison baselines [12]
  nand_write_energy_j: 500.0e-15    # ~500 fJ (25-100x worse vs FeCIM)
  dram_access_energy_j: 5000.0e-15  # ~5 pJ (1000x worse)
  sram_access_energy_j: 50.0e-15    # ~50 fJ

  # CIM benchmarks [14]
  cim_area_efficiency_gops_mm2: 160   # 160 GOPS/mm² (DAC 2024)
  cim_energy_efficiency_tops_w: 25.5  # 25.5 TOPS/W for 8b/8b (DAC 2024)

  # Leakage
  standby_power_w_per_cell: 1.0e-12 # ~1 pW standby

# =============================================================================
# TIMING PARAMETERS
# =============================================================================
# References: [8][9]
timing:
  # Operation latencies (seconds)
  read_latency_s: 10.0e-9       # 10 ns read
  write_latency_s: 100.0e-9     # 100 ns write (program-verify)
  mac_latency_s: 10.0e-9        # 10 ns per MAC

  # Switching speed records [8]
  switching_time_typical_s: 925.0e-12  # 925 ps characteristic (Purdue)
  switching_time_record_s: 360.0e-12   # 360 ps RECORD in sub-µm arrays [8]

  # Programming parameters
  pulse_width_s: 10.0e-9        # 10 ns programming pulse
  verify_delay_s: 5.0e-9        # 5 ns verify delay
  max_program_cycles: 10        # Max program-verify iterations

# =============================================================================
# PREISACH MODEL PARAMETERS
# =============================================================================
preisach:
  # Grid resolution
  grid_size: 30                 # Hysteron grid (NxN)

  # Distribution parameters (as fraction of Ec)
  alpha_sigma_ratio: 0.20       # σ_α / Ec = 20%
  beta_sigma_ratio: 0.20        # σ_β / Ec = 20%
  correlation: 0.5              # α-β correlation

  # Fatigue model
  fatigue_rate: 1.0e-10         # Degradation per cycle
  wakeup_cycles: 100            # Cycles for wake-up
  initial_wakeup: 0.8           # Initial wake-up factor

# =============================================================================
# CALIBRATION PARAMETERS
# =============================================================================
calibration:
  # Binary search calibration
  iterations: 15                # Binary search iterations
  field_min_ratio: 0.7          # Read max = 0.7 * Vc (30% safety margin below Vc for non-destructive reads)
  field_max_ratio: 2.5          # Max field = 2.5 * Ec

  # Adaptive calibration
  adjustment_rate: 0.06         # 6% of Ec per level error

  # Tolerances
  level_tolerance: 1            # Accept ±1 level as success

# =============================================================================
# SIMULATION PARAMETERS
# =============================================================================
simulation:
  # Time stepping
  frame_rate_hz: 60             # UI update rate
  dt_s: 0.0167                  # Time step (1/60 s)

  # History
  max_history_points: 500       # P-E plot trail length

  # Default waveform parameters
  default_frequency_hz: 0.5     # Default frequency for waveforms
  default_amplitude_ratio: 1.5  # Default E amplitude = 1.5 * Ec (enough for switching, avoid over-saturation)

# =============================================================================
# MNIST DEMO PARAMETERS
# =============================================================================
# References: [16][17][18]
mnist:
  # Network architecture
  input_size: 784               # 28x28 pixels
  hidden_sizes: [128, 64]       # Hidden layer sizes
  output_size: 10               # 10 digit classes

  # Training
  epochs: 10
  batch_size: 64
  learning_rate: 0.001

  # Reference accuracy (peer-reviewed benchmarks, not targets)
  # Note: Accuracy varies with noise, levels, and architecture
  baseline_accuracy: 0.966      # 96.6% (Nature Communications 2023) - VERIFIED
  best_accuracy: 0.9824         # 98.24% (ScienceDirect 2025) - VERIFIED (FTJ reservoir)
  # tour_claimed_accuracy: 0.87 # REMOVED - unverified conference claim below peer-reviewed
  current_limited_accuracy: 0.97 # 97% with current-limited FeFET [16]
  fashion_mnist_rc: 0.8838      # 88.38% Fashion MNIST with reservoir computing

# =============================================================================
# ADDITIONAL BENCHMARKS (from new papers)
# =============================================================================
benchmarks:
  # Matrix operations [13]
  matrix_precision: "fp32"      # 32-bit floating point equivalent precision
  matrix_size_max: 16           # 16×16 demonstrated with high precision

  # Reservoir computing
  rc_energy_vs_gpu: 10000       # 10⁴× lower energy than GPU
  rc_endurance_cycles: 100000   # >10⁵ cycles demonstrated

  # Security/PUF
  puf_ml_attack_resistance: 10000000  # Resists 10M sample ML attacks
  puf_reconfigurability: "near_ideal"
