name: CI

on:
  push:
    branches: [main]
  pull_request:

jobs:
  ci:
    runs-on: ubuntu-latest
    timeout-minutes: 10

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Install GUI build dependencies
        run: |
          sudo apt-get update
          sudo apt-get install -y libgl1-mesa-dev xorg-dev

      - name: Setup Go
        uses: actions/setup-go@v5
        with:
          go-version: '1.24'
          cache: true

      - name: Run make ci
        run: make ci

      - name: Architecture check
        run: make arch-check

      - name: Literature P-E loop validation (RG-PHY-OBS-01, PR lane)
        env:
          FECIM_CI_GATE: pr
          FECIM_GIT_COMMIT: ${{ github.sha }}
          FECIM_LITERATURE_JSON_DIR: ${{ github.workspace }}/output/validation/literature
        run: |
          mkdir -p output/validation/literature
          go test -v -count=1 ./validation/literature/... -run TestModule1_PELoop_LiteratureBacked

      - name: Race detection (core packages)
        run: go test -race -short ./shared/... ./validation/...

      - name: Generate coverage report
        run: go test -short ./... -coverprofile=coverage.out

      - name: Upload coverage artifact
        uses: actions/upload-artifact@v4
        with:
          name: coverage-report
          path: coverage.out
          if-no-files-found: error

  external-validation:
    runs-on: ubuntu-latest
    timeout-minutes: 10
    continue-on-error: true

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Install GUI build dependencies
        run: |
          sudo apt-get update
          sudo apt-get install -y libgl1-mesa-dev xorg-dev

      - name: Setup Go
        uses: actions/setup-go@v5
        with:
          go-version: '1.24'
          cache: true

      - name: Detect optional external tools
        id: tools
        shell: bash
        run: |
          if command -v ngspice >/dev/null 2>&1; then
            echo "has_ngspice=true" >> "$GITHUB_OUTPUT"
            echo "ngspice detected"
          else
            echo "has_ngspice=false" >> "$GITHUB_OUTPUT"
            echo "ngspice missing; external validation tests will be skipped"
          fi

          if command -v iverilog >/dev/null 2>&1; then
            echo "has_iverilog=true" >> "$GITHUB_OUTPUT"
            echo "iverilog detected"
          else
            echo "has_iverilog=false" >> "$GITHUB_OUTPUT"
            echo "iverilog missing; verilog simulation checks will be skipped"
          fi

      - name: Run ngspice external validation tests
        if: steps.tools.outputs.has_ngspice == 'true'
        run: go test -v ./validation/... -run 'NGSpice|Spice|External'

      - name: Run iverilog external validation tests
        if: steps.tools.outputs.has_iverilog == 'true'
        run: go test -v ./validation/... -run 'Verilog|Icarus|External'

      - name: Summary for skipped optional checks
        if: steps.tools.outputs.has_ngspice != 'true' || steps.tools.outputs.has_iverilog != 'true'
        run: |
          echo "Optional external validation checks were skipped due to missing toolchain components."
          echo "This is non-fatal by policy."
