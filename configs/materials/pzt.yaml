# PZT — Lead Zirconate Titanate Pb(Zr,Ti)O₃
# Representative parameters for PZT 52/48 near morphotropic phase boundary
#
# References:
#   Jaffe et al., "Piezoelectric Ceramics" (1971)
#   Damjanovic, Rep. Prog. Phys. 61, 1267 (1998)

name: "PZT"
description: "Lead Zirconate Titanate Pb(Zr0.52Ti0.48)O3, morphotropic phase boundary"
source: "Jaffe et al. 1971; Damjanovic RPP 1998"

# Polarization (µC/cm²)
remnant_polarization_uc_cm2: 38.0
saturation_polarization_uc_cm2: 50.0

# Coercive field (kV/cm)
coercive_field_kv_cm: 80.0

# Dielectric
dielectric_constant: 1200.0
dielectric_constant_lf: 2000.0

# Film geometry (typical thin-film PZT)
film_thickness_nm: 200.0

landau:
  beta: -1.5e8
  gamma: 2.5e9
  rho: 5.0e3

depolarization_coeff: 5.0e6

tau0_nls_s: 1.0e-10
ea_nls_v_per_m: 5.0e8
nls_sigma: 1.3

curie_temp_k: 650.0
curie_const_k: 2.0e5

g_min_s: 1.0e-9
g_max_s: 1.0e-7

num_levels: 30
symmetrize: false
